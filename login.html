<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanFix - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4cc9f0;
            --success: #4bb543;
            --danger: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&auto=format&fit=crop&w=2013&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(to right, rgba(67, 97, 238, 0.9), rgba(63, 55, 201, 0.9));
            color: white;
            padding: 2rem 0;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .logo { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .tagline { font-size: 1.1rem; opacity: 0.9; }
        
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; flex: 1; }
        .login-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 380px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); }
        .card-header {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .card-title { font-size: 1.5rem; font-weight: 600; }
        .card-body { padding: 2rem; color: #333; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.2);
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15); }
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .note { margin-top: 1.5rem; font-size: 0.9rem; color: #6c757d; text-align: center; }
        .note a { color: var(--primary); text-decoration: none; }
        
        .password-note {
            background-color: #f8f9fa;
            border-left: 4px solid var(--accent);
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            border-radius: 0 4px 4px 0;
        }
        
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .alert-danger { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .footer {
            text-align: center;
            padding: 1.5rem;
            background-color: rgba(33, 37, 41, 0.9);
            color: white;
            margin-top: auto;
        }
        
        @media (max-width: 768px) {
            .login-container { flex-direction: column; align-items: center; }
            .login-card { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="logo">UrbanFix</h1>
        <p class="tagline">Report. Resolve. Revitalize.</p>
    </header>
    
    <div class="container">
        <div class="login-container">
            <!-- Citizen Login Card -->
            <div class="login-card">
                <div class="card-header">
                    <h2 class="card-title">Citizen Login</h2>
                </div>
                <div class="card-body">
                    <div id="citizen-alert" class="alert" style="display: none;"></div>
                    <form id="citizenLogin">
                        <div class="form-group">
                            <label>Your Name *</label>
                            <input type="text" id="citizenName" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label>Email (Optional)</label>
                            <input type="email" id="citizenEmail" class="form-control" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Phone (Optional)</label>
                            <input type="tel" id="citizenPhone" class="form-control" placeholder="Enter your phone number">
                        </div>
                        <button type="submit" class="btn" id="citizen-btn">
                            <span id="citizen-btn-text">Continue as Citizen</span>
                        </button>
                    </form>
                    <p class="note">Your voice matters in shaping our city's future</p>
                </div>
            </div>
            
            <!-- Department Login Card -->
            <div class="login-card">
                <div class="card-header">
                    <h2 class="card-title">Department Login</h2>
                </div>
                <div class="card-body">
                    <div id="department-alert" class="alert" style="display: none;"></div>
                    <form id="departmentLogin">
                        <div class="form-group">
                            <label>Select Department</label>
                            <select id="deptName" class="form-control" required>
                                <option value="">-- Choose Department --</option>
                                <option value="Streetlight">Streetlight Department</option>
                                <option value="Sanitation">Sanitation Department</option>
                                <option value="Transportation">Transportation Department</option>
                                <option value="Water">Water Department</option>
                                <option value="Electricity">Electricity Department</option>
                                <option value="Waste Management">Waste Management</option>
                                <option value="Road Maintenance">Road Maintenance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="deptPassword" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn" id="department-btn">
                            <span id="department-btn-text">Access Department Portal</span>
                        </button>
                    </form>
                    <div class="password-note">
                        <strong>Demo Credentials:</strong> Use department name + "123" (e.g., streetlight123)
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2024 UrbanFix. Empowering citizens and municipalities to build better cities.</p>
    </footer>
    
    <script>
        // ===== DATA FUNCTIONS =====
        function getDepartments() {
            try {
                return JSON.parse(localStorage.getItem('urbanfix_departments') || '[]');
            } catch {
                return [];
            }
        }

        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem('urbanfix_currentUser') || 'null');
            } catch {
                return null;
            }
        }

        function setCurrentUser(user) {
            localStorage.setItem('urbanfix_currentUser', JSON.stringify(user));
        }

        // Initialize departments if not exists
        if (getDepartments().length === 0) {
            localStorage.setItem('urbanfix_departments', JSON.stringify([
                { id: 'dept1', name: 'Streetlight', password: 'streetlight123' },
                { id: 'dept2', name: 'Sanitation', password: 'sanitation123' },
                { id: 'dept3', name: 'Transportation', password: 'transportation123' },
                { id: 'dept4', name: 'Water', password: 'water123' },
                { id: 'dept5', name: 'Electricity', password: 'electricity123' },
                { id: 'dept6', name: 'Waste Management', password: 'wastemanagement123' },
                { id: 'dept7', name: 'Road Maintenance', password: 'roadmaintenance123' }
            ]));
        }

        function showAlert(containerId, message, type) {
            const alertDiv = document.getElementById(containerId);
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        function setButtonLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const buttonText = document.getElementById(`${buttonId}-text`);
            
            if (isLoading) {
                button.disabled = true;
                buttonText.innerHTML = '<span class="loading"></span> Processing...';
            } else {
                button.disabled = false;
                buttonText.textContent = buttonId === 'citizen-btn' ? 'Continue as Citizen' : 'Access Department Portal';
            }
        }

        // Citizen login
        document.getElementById('citizenLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('citizenName').value.trim();
            const email = document.getElementById('citizenEmail').value.trim();
            const phone = document.getElementById('citizenPhone').value.trim();
            
            if (!name) {
                showAlert('citizen-alert', 'Please enter your name', 'danger');
                return;
            }
            
            setButtonLoading('citizen-btn', true);
            
            try {
                const userData = {
                    name: name,
                    email: email || `${name.toLowerCase().replace(/\s+/g, '')}@urbanfix.app`,
                    phone: phone || '',
                    type: 'citizen'
                };
                
                setCurrentUser(userData);
                showAlert('citizen-alert', 'Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/urbanfix/';
                }, 1000);
                
            } catch (error) {
                console.error('Citizen login error:', error);
                showAlert('citizen-alert', 'Login failed. Please try again.', 'danger');
            } finally {
                setButtonLoading('citizen-btn', false);
            }
        });

        // Department login
        document.getElementById('departmentLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const deptName = document.getElementById('deptName').value;
            const password = document.getElementById('deptPassword').value;
            
            if (!deptName || !password) {
                showAlert('department-alert', 'Please select department and enter password', 'danger');
                return;
            }
            
            setButtonLoading('department-btn', true);
            
            try {
                const departments = getDepartments();
                const dept = departments.find(d => d.name === deptName);
                
                if (!dept || dept.password !== password) {
                    showAlert('department-alert', 'Invalid credentials. Please try again.', 'danger');
                    setButtonLoading('department-btn', false);
                    return;
                }

                const userData = {
                    name: deptName,
                    type: 'department',
                    department: deptName
                };
                
                setCurrentUser(userData);
                localStorage.setItem('urbanfix_deptToken', btoa(deptName + ':' + Date.now()));
                showAlert('department-alert', 'Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/urbanfix/?page=department-dashboard';
                }, 1000);
                
            } catch (error) {
                console.error('Department login error:', error);
                showAlert('department-alert', 'Login failed. Please try again.', 'danger');
            } finally {
                setButtonLoading('department-btn', false);
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            
            if (user) {
                if (user.type === 'citizen') {
                    window.location.href = '/urbanfix/';
                } else if (user.type === 'department') {
                    window.location.href = '/urbanfix/?page=department-dashboard';
                }
            }
        });

        // Demo password hint
        document.getElementById('deptName').addEventListener('change', function() {
            const deptName = this.value;
            if (deptName) {
                const defaultPassword = deptName.toLowerCase().replace(' ', '') + '123';
                document.getElementById('deptPassword').placeholder = `e.g., ${defaultPassword}`;
            }
        });
    </script>
</body>
</html>
